<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Page</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        min-height: 100vh;
        background: #1a1a2e;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        font-family: 'Courier New', 'Source Code Pro', monospace;
    }

    /* ====== 像素爱心（box-shadow 技术） ====== */
    .pixel-heart {
        position: absolute;
        width: 8px; height: 8px;
        pointer-events: none;
        animation: float 7s ease-in-out infinite;
    }
    /* 基础像素点，::after 画出 7×7 爱心形状 */
    .pixel-heart::after {
        content: '';
        display: block;
        width: 8px; height: 8px;
        box-shadow:
            /* row0       .  .  X  .  X  .  .  */
            16px 0    var(--c),
            32px 0    var(--c),

            /* row1       .  X  X  X  X  X  .  */
            8px  8px  var(--c),
            16px 8px  var(--c),
            24px 8px  var(--c),
            32px 8px  var(--c),
            40px 8px  var(--c),

            /* row2       X  X  X  X  X  X  X  */
            0    16px var(--c),
            8px  16px var(--c),
            16px 16px var(--c),
            24px 16px var(--c),
            32px 16px var(--c),
            40px 16px var(--c),
            48px 16px var(--c),

            /* row3       X  X  X  X  X  X  X  */
            0    24px var(--c),
            8px  24px var(--c),
            16px 24px var(--c),
            24px 24px var(--c),
            32px 24px var(--c),
            40px 24px var(--c),
            48px 24px var(--c),

            /* row4       .  X  X  X  X  X  .  */
            8px  32px var(--c),
            16px 32px var(--c),
            24px 32px var(--c),
            32px 32px var(--c),
            40px 32px var(--c),

            /* row5       .  .  X  X  X  .  .  */
            16px 40px var(--c),
            24px 40px var(--c),
            32px 40px var(--c),

            /* row6       .  .  .  X  .  .  .  */
            24px 48px var(--c);
    }

    @keyframes float {
        0%, 100% { transform: translateY(0)    rotate(0deg);   opacity: 0.5; }
        25%      { transform: translateY(-12px) rotate(2deg);   opacity: 0.9; }
        50%      { transform: translateY(-6px)  rotate(-2deg);  opacity: 0.7; }
        75%      { transform: translateY(-18px) rotate(1deg);   opacity: 1;   }
    }

    /* 位置与动画延迟 */
    .pixel-heart:nth-child(1)  { left: 4%;  top: 8%;  animation-delay: 0s;    --c: #ff6b9d; transform: scale(1.2); }
    .pixel-heart:nth-child(2)  { left: 82%; top: 12%; animation-delay: -1.2s; --c: #ff8db5; transform: scale(0.8); }
    .pixel-heart:nth-child(3)  { left: 8%;  top: 72%; animation-delay: -2.5s; --c: #ff6b9d; transform: scale(0.9); }
    .pixel-heart:nth-child(4)  { left: 78%; top: 78%; animation-delay: -3.8s; --c: #ffa4c4; transform: scale(1.4); }
    .pixel-heart:nth-child(5)  { left: 40%; top: 6%;  animation-delay: -1.8s; --c: #ffe0ec; transform: scale(0.6); }
    .pixel-heart:nth-child(6)  { left: 55%; top: 88%; animation-delay: -4.2s; --c: #ff8db5; transform: scale(1.0); }
    .pixel-heart:nth-child(7)  { left: 18%; top: 38%; animation-delay: -5.0s; --c: #ffa4c4; transform: scale(0.7); }
    .pixel-heart:nth-child(8)  { left: 68%; top: 45%; animation-delay: -0.6s; --c: #ff6b9d; transform: scale(1.1); }

    /* ====== 像素星星 ====== */
    .pixel-star {
        position: absolute;
        width: 4px; height: 4px;
        background: #ffe0ec;
        pointer-events: none;
        animation: twinkle 2.5s ease-in-out infinite;
    }
    .pixel-star:nth-child(9)  { left: 15%; top: 20%; animation-delay: 0s; }
    .pixel-star:nth-child(10) { left: 75%; top: 30%; animation-delay: 0.6s; }
    .pixel-star:nth-child(11) { left: 25%; top: 60%; animation-delay: 1.2s; }
    .pixel-star:nth-child(12) { left: 65%; top: 65%; animation-delay: 1.8s; }
    .pixel-star:nth-child(13) { left: 50%; top: 15%; animation-delay: 0.3s; }
    .pixel-star:nth-child(14) { left: 35%; top: 80%; animation-delay: 2.1s; }

    @keyframes twinkle {
        0%, 100% { opacity: 0.2; transform: scale(1); }
        50%      { opacity: 1;   transform: scale(2); }
    }

    /* ====== 像素装饰方块 ====== */
    .pixel-block {
        position: absolute;
        width: 6px; height: 6px;
        background: rgba(255,107,157,0.3);
        pointer-events: none;
        image-rendering: pixelated;
    }
    .pixel-block:nth-child(15) { left: 12%; top: 55%; }
    .pixel-block:nth-child(16) { left: 72%; top: 18%; }
    .pixel-block:nth-child(17) { left: 88%; top: 55%; }
    .pixel-block:nth-child(18) { left: 45%; top: 92%; }
    .pixel-block:nth-child(19) { left: 6%;  top: 90%; }
    .pixel-block:nth-child(20) { left: 92%; top: 40%; }

    /* ====== 主卡片 ====== */
    .card {
        position: relative;
        z-index: 1;
        background: rgba(26,26,46,0.85);
        border: 3px solid #ff6b9d;
        padding: 44px 36px 36px;
        text-align: center;
        width: 380px;
        max-width: 90vw;
        box-shadow:
            6px 6px 0 #ff6b9d,
            0 0 80px rgba(255,107,157,0.15);
        image-rendering: pixelated;
    }

    /* 卡片四角装饰 */
    .card::before,
    .card::after {
        content: '';
        position: absolute;
        width: 20px; height: 20px;
    }
    .card::before { top: -3px; left: -3px;  border-top: 5px solid #ff6b9d; border-left: 5px solid #ff6b9d; }
    .card::after  { bottom: -3px; right: -3px; border-bottom: 5px solid #ff6b9d; border-right: 5px solid #ff6b9d; }

    .corner-tr, .corner-bl {
        position: absolute;
        width: 20px; height: 20px;
    }
    .corner-tr { top: -3px; right: -3px;  border-top: 5px solid #ff6b9d; border-right: 5px solid #ff6b9d; }
    .corner-bl { bottom: -3px; left: -3px; border-bottom: 5px solid #ff6b9d; border-left: 5px solid #ff6b9d; }

    /* ====== 卡片内容 ====== */
    .card h1 {
        font-family: 'Courier New', monospace;
        color: #ffa4c4;
        font-size: 26px;
        letter-spacing: 6px;
        text-shadow: 3px 3px 0 #ff6b9d;
        margin-bottom: 8px;
    }

    .card .pixel-line {
        color: #ff6b9d;
        font-size: 14px;
        letter-spacing: 6px;
        margin: 18px 0;
        user-select: none;
    }

    .card .content {
        color: #ccc;
        font-size: 16px;
        line-height: 2.2;
        min-height: 40px;
        letter-spacing: 1px;
    }

    .card .content a {
        color: #ffa4c4;
        text-decoration: none;
    }

    /* 卡片内小爱心 */
    .heart-icon {
        display: inline-block;
        width: 6px; height: 6px;
        margin: 0 10px;
        vertical-align: middle;
        position: relative;
    }
    .heart-icon::after {
        content: '';
        display: block;
        width: 6px; height: 6px;
        box-shadow:
            12px 0    #ff6b9d, 24px 0    #ff6b9d,
            6px  6px  #ff6b9d, 12px 6px  #ff6b9d, 18px 6px  #ff6b9d, 24px 6px  #ff6b9d, 30px 6px  #ff6b9d,
            0    12px #ff6b9d, 6px  12px #ff6b9d, 12px 12px #ff6b9d, 18px 12px #ff6b9d, 24px 12px #ff6b9d, 30px 12px #ff6b9d, 36px 12px #ff6b9d,
            0    18px #ff6b9d, 6px  18px #ff6b9d, 12px 18px #ff6b9d, 18px 18px #ff6b9d, 24px 18px #ff6b9d, 30px 18px #ff6b9d, 36px 18px #ff6b9d,
            6px  24px #ff6b9d, 12px 24px #ff6b9d, 18px 24px #ff6b9d, 24px 24px #ff6b9d, 30px 24px #ff6b9d,
            12px 30px #ff6b9d, 18px 30px #ff6b9d, 24px 30px #ff6b9d,
            18px 36px #ff6b9d;
    }
</style>
</head>
<body>

<!-- 装饰元素 -->
<div class="pixel-heart"></div>
<div class="pixel-heart"></div>
<div class="pixel-heart"></div>
<div class="pixel-heart"></div>
<div class="pixel-heart"></div>
<div class="pixel-heart"></div>
<div class="pixel-heart"></div>
<div class="pixel-heart"></div>

<div class="pixel-star"></div>
<div class="pixel-star"></div>
<div class="pixel-star"></div>
<div class="pixel-star"></div>
<div class="pixel-star"></div>
<div class="pixel-star"></div>

<div class="pixel-block"></div>
<div class="pixel-block"></div>
<div class="pixel-block"></div>
<div class="pixel-block"></div>
<div class="pixel-block"></div>
<div class="pixel-block"></div>

<!-- 主卡片 -->
<div class="card">
    <div class="corner-tr"></div>
    <div class="corner-bl"></div>

    <div class="heart-icon"></div>
    <h1>MY PAGE</h1>
    <div class="heart-icon" style="transform:scaleX(-1);"></div>

    <div class="pixel-line">■ ■ ■ ■ ■ ■ ■</div>

    <div class="content">
        <!-- 在这里添加你的文字 -->
        欢迎来到我的主页
    </div>

    <div class="pixel-line">■ ■ ■ ■ ■ ■ ■</div>

    <!-- 卡片内星点 -->
    <div class="pixel-star" style="top:14px;left:22px;animation-delay:0.3s;"></div>
    <div class="pixel-star" style="top:14px;right:22px;animation-delay:1.0s;"></div>
</div>

</body>
</html>
